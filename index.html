<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FlashCards Teknologi – Liquid Glass</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a20">
  <!-- Google Sans Light (300) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-animation"></div>
  <button id="installButton" class="install-btn">📲 Pasang Aplikasi</button>

  <div class="container">
    <div class="card-wrapper" id="cardWrapper">
      <div class="card" id="flashcard">
        <div class="card-face card-front">
          <div class="icon-container" id="iconContainer">
            <img id="iconImage" src="" alt="icon" style="opacity:0; transition: opacity 0.3s;">
            <div class="shimmer"></div>
          </div>
          <div class="card-id" id="iconIdDisplay">react</div>
        </div>
        <div class="card-face card-back">
          <div class="back-title" id="backTitle">Teknologi</div>
          <div class="note-field">
            <label>Nama</label>
            <input type="text" id="nameInput" placeholder="Contoh: React">
          </div>
          <div class="note-field">
            <label>Pengasas</label>
            <input type="text" id="founderInput" placeholder="Contoh: Jordan Walke">
          </div>
          <div class="note-field">
            <label>Aplikasi Popular</label>
            <input type="text" id="appInput" placeholder="Contoh: Facebook">
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn"><span class="btn-icon">◀</span> Sebelum</button>
      <button class="btn" id="flipBtn"><span class="btn-icon">🔄</span> Belek</button>
      <button class="btn" id="nextBtn">Seterusnya <span class="btn-icon">▶</span></button>
    </div>
    <div class="swipe-hint">← Leret kiri/kanan atau ketik untuk belek →</div>
    <div class="progress" id="progressDots"></div>
  </div>

  <!-- Fail logo diasingkan -->
  <script src="icons.js"></script>
  <script src="script.js"></script>
</body>
</html>
