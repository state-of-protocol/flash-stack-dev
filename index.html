<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FlashCards Teknologi - Liquid Glass</title>
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZsYXNoQ2FyZHMgVGVrbm9sb2dpIiwKICAic2hvcnRfbmFtZSI6ICJGbGFzaENhcmRzIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwYTBhMjAiLAogICJ0aGVtZV9jb2xvciI6ICIjMGUwZTBmIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiZGF0YTppbWFnZS9zdmcreG1sLCUzQ3N2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJyUzRSUzQ3RleHQgeT0nLjllbScgZm9udC1zaXplPSc5MCclMjBmb250LWZhbWlseT0nc2Fucy1zZXJpZiclMjB0ZXh0LWFuY2hvcj0nbWlkZGxlJz7inZbvuI88L3RleHQ%2BPC9zdmc%2BIiwKICAgICAgInNpemVzIjogIjE5MngxOTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9zdmcreG1sIgogICAgfQogIF0KfQ==">
  <meta name="theme-color" content="#0a0a20">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a20 0%, #1a1a3e 50%, #0f0f2d 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: pan-y; /* allow vertical scroll but not horizontal native */
    }
    .background-animation {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(72, 202, 228, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(192, 132, 252, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(94, 234, 212, 0.1) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 90vw;
      max-width: 420px;
      height: 80vh;
      max-height: 650px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    /* Card Glass Effect */
    .card-wrapper {
      width: 100%;
      height: 70%;
      perspective: 1200px;
      margin-bottom: 30px;
    }
    .card {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      will-change: transform;
    }
    .card.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
    }
    .card-back {
      transform: rotateY(180deg);
      justify-content: flex-start;
      padding-top: 40px;
      gap: 20px;
      background: rgba(20, 20, 50, 0.6);
    }
    /* Icon container */
    .icon-container {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .icon-container img {
      width: 70%;
      height: 70%;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
    }
    .card-id {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 300;
    }
    .back-title {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .note-field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .note-field label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .note-field input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      color: white;
      font-size: 0.95rem;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      outline: none;
      transition: 0.2s;
    }
    .note-field input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 15px rgba(168, 127, 250, 0.3);
    }
    .controls {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 12px 24px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn:active { transform: scale(0.95); }
    .btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
    .btn-icon { font-size: 1.2rem; }
    .swipe-hint {
      color: rgba(255,255,255,0.3);
      font-size: 0.7rem;
      margin-top: 10px;
      text-align: center;
    }
    .progress {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 15px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: 0.3s;
    }
    .dot.active { background: #a78bfa; box-shadow: 0 0 10px #a78bfa; }
    /* Install button */
    .install-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(139, 92, 246, 0.2);
      border: 1px solid rgba(168, 127, 250, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 8px 16px;
      color: #c4b5fd;
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
<div class="background-animation"></div>
<button id="installButton" class="install-btn">📲 Pasang Aplikasi</button>
<div class="container">
  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="flashcard">
      <div class="card-face card-front">
        <div class="icon-container"><img id="iconImage" src="" alt="icon"></div>
        <div class="card-id" id="iconIdDisplay">react</div>
      </div>
      <div class="card-face card-back">
        <div class="back-title" id="backTitle">Teknologi</div>
        <div class="note-field">
          <label>Nama</label>
          <input type="text" id="nameInput" placeholder="Contoh: React">
        </div>
        <div class="note-field">
          <label>Pengasas</label>
          <input type="text" id="founderInput" placeholder="Contoh: Jordan Walke">
        </div>
        <div class="note-field">
          <label>Aplikasi Popular</label>
          <input type="text" id="appInput" placeholder="Contoh: Facebook">
        </div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="prevBtn"><span class="btn-icon">◀</span> Sebelum</button>
    <button class="btn" id="flipBtn"><span class="btn-icon">🔄</span> Belek</button>
    <button class="btn" id="nextBtn">Seterusnya <span class="btn-icon">▶</span></button>
  </div>
  <div class="swipe-hint">← Leret kiri/kanan atau ketik untuk belek →</div>
  <div class="progress" id="progressDots"></div>
</div>

<script>
  // === PWA REGISTRATION ===
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        // Fallback: kita akan inject service worker inline melalui blob
        const swBlob = new Blob([`
          const CACHE_NAME = 'flashcards-v1';
          const urlsToCache = [
            '/',
            'index.html',
            // Akan menambah icon URLs secara dinamik melalui fetch event
          ];

          self.addEventListener('install', event => {
            self.skipWaiting();
          });

          self.addEventListener('activate', event => {
            event.waitUntil(clients.claim());
          });

          self.addEventListener('fetch', event => {
            const url = new URL(event.request.url);
            // Cache semua request ke devicon CDN dan aset local
            if (url.hostname.includes('cdn.jsdelivr.net') || url.pathname === '/' || url.pathname.endsWith('.html')) {
              event.respondWith(
                caches.match(event.request).then(response => {
                  return response || fetch(event.request).then(fetchResponse => {
                    if (fetchResponse.ok) {
                      const responseClone = fetchResponse.clone();
                      caches.open(CACHE_NAME).then(cache => cache.put(event.request, responseClone));
                    }
                    return fetchResponse;
                  });
                }).catch(() => caches.match(event.request))
              );
            }
          });
        `], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl);
      });
    });
  }

  // === MANIFEST INJECTION (jika tiada) ===
  if (!document.querySelector('link[rel="manifest"]')) {
    const manifest = {
      name: "FlashCards Teknologi",
      short_name: "FlashCards",
      start_url: ".",
      display: "standalone",
      background_color: "#0a0a20",
      theme_color: "#0a0a20",
      icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='sans-serif' text-anchor='middle'%3E💡%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  }

  // === INSTALL PROMPT ===
  let deferredPrompt;
  const installBtn = document.getElementById('installButton');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });
  installBtn.addEventListener('click', () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; installBtn.style.display = 'none'; });
    }
  });

  // === ICON DATASET & MAPPING ===
  const iconList = [
    'ableton','activitypub','actix','adonis','ae','aiscript','alpinejs','anaconda','androidstudio',
    'angular','ansible','apollo','apple','appwrite','arch','arduino','astro','atom','au','autocad',
    'aws','azul','azure','babel','bash','bevy','bitbucket','blender','bootstrap','bsd','bun','c','cs',
    'cpp','crystal','cassandra','clion','clojure','cloudflare','cmake','codepen','coffeescript','css',
    'cypress','d3','dart','debian','deno','devto','discord','bots','discordjs','django','docker','dotnet',
    'dynamodb','eclipse','elasticsearch','electron','elixir','elysia','emacs','ember','emotion','express',
    'fastapi','fediverse','figma','firebase','flask','flutter','forth','fortran','gamemakerstudio','gatsby',
    'gcp','git','github','githubactions','gitlab','gmail','gherkin','go','gradle','godot','grafana','graphql',
    'gtk','gulp','haskell','haxe','haxeflixel','heroku','hibernate','html','htmx','idea','ai','instagram',
    'ipfs','java','js','jenkins','jest','jquery','kafka','kali','kotlin','ktor','kubernetes','laravel','latex',
    'less','linkedin','linux','lit','lua','md','mastodon','materialui','matlab','maven','mint','misskey',
    'mongodb','mysql','neovim','nestjs','netlify','nextjs','nginx','nim','nix','nodejs','notion','npm','nuxtjs',
    'obsidian','ocaml','octave','opencv','openshift','openstack','p5js','perl','ps','php','phpstorm','pinia',
    'pkl','plan9','planetscale','pnpm','postgres','postman','powershell','pr','prisma','processing','prometheus',
    'pug','pycharm','py','pytorch','qt','r','rabbitmq','rails','raspberrypi','react','reactivex','redhat',
    'redis','redux','regex','remix','replit','rider','robloxstudio','rocket','rollupjs','ros','ruby','rust',
    'sass','spring','sqlite','stackoverflow','styledcomponents','sublime','supabase','scala','sklearn','selenium',
    'sentry','sequelize','sketchup','solidity','solidjs','svelte','svg','swift','symfony','tailwind','tauri',
    'tensorflow','terraform','threejs','twitter','ts','ubuntu','unity','unreal','v','vala','vercel','vim',
    'visualstudio','vite','vitest','vscode','vscodium','vue','vuetify','wasm','webflow','webpack','webstorm',
    'windicss','windows','wordpress','workers','xd','yarn','yew','zig'
  ];

  const deviconFolderMap = {
    'ae': 'aftereffects', 'ai': 'illustrator', 'au': 'audition', 'ps': 'photoshop', 'pr': 'premiere',
    'cpp': 'cplusplus', 'cs': 'csharp', 'ts': 'typescript', 'js': 'javascript', 'md': 'markdown',
    'py': 'python', 'r': 'r', 'xd': 'xd', 'bots': 'discordbots', 'discordjs': 'discordjs',
    'materialui': 'materialui', 'sklearn': 'scikitlearn', 'windicss': 'windicss',
    'nuxtjs': 'nuxtjs', 'nextjs': 'nextjs', 'nestjs': 'nestjs', 'nodejs': 'nodejs',
    'express': 'express', 'fastapi': 'fastapi', 'flask': 'flask', 'django': 'django',
    'laravel': 'laravel', 'rails': 'rails', 'symfony': 'symfony', 'vue': 'vuejs',
    'react': 'react', 'angular': 'angular', 'svelte': 'svelte', 'solidjs': 'solidjs',
    'tailwind': 'tailwindcss', 'bootstrap': 'bootstrap', 'sass': 'sass', 'less': 'less',
    'jquery': 'jquery', 'gulp': 'gulp', 'webpack': 'webpack', 'rollupjs': 'rollupjs',
    'vite': 'vite', 'vitest': 'vitest', 'jest': 'jest', 'cypress': 'cypress',
    'selenium': 'selenium', 'postman': 'postman', 'docker': 'docker', 'kubernetes': 'kubernetes',
    'terraform': 'terraform', 'ansible': 'ansible', 'jenkins': 'jenkins', 'githubactions': 'githubactions',
    'gitlab': 'gitlab', 'bitbucket': 'bitbucket', 'git': 'git', 'github': 'github',
    'aws': 'amazonwebservices', 'gcp': 'googlecloud', 'azure': 'azure', 'firebase': 'firebase',
    'heroku': 'heroku', 'netlify': 'netlify', 'vercel': 'vercel', 'cloudflare': 'cloudflare',
    'mongodb': 'mongodb', 'postgres': 'postgresql', 'mysql': 'mysql', 'sqlite': 'sqlite',
    'redis': 'redis', 'elasticsearch': 'elasticsearch', 'dynamodb': 'dynamodb',
    'graphql': 'graphql', 'apollo': 'apollo', 'prisma': 'prisma', 'sequelize': 'sequelize',
    'hibernate': 'hibernate', 'kafka': 'apachekafka', 'rabbitmq': 'rabbitmq',
    'androidstudio': 'androidstudio', 'xcode': 'xcode', 'visualstudio': 'visualstudio',
    'vscode': 'vscode', 'idea': 'intellij', 'pycharm': 'pycharm', 'webstorm': 'webstorm',
    'phpstorm': 'phpstorm', 'clion': 'clion', 'rider': 'rider', 'eclipse': 'eclipse',
    'atom': 'atom', 'sublime': 'sublime', 'emacs': 'emacs', 'vim': 'vim', 'neovim': 'neovim',
    'unity': 'unity', 'unreal': 'unrealengine', 'godot': 'godot', 'robloxstudio': 'robloxstudio',
    'blender': 'blender', 'figma': 'figma', 'sketchup': 'sketchup', 'autocad': 'autocad',
    'illustrator': 'illustrator', 'photoshop': 'photoshop', 'premierepro': 'premierepro',
    'aftereffects': 'aftereffects', 'audition': 'audition', 'xd': 'xd',
  };

  function getDeviconUrl(iconId) {
    let folder = deviconFolderMap[iconId] || iconId;
    // Handle dark variants specifically
    // Cubalah original dulu
    return `https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/${folder}/${folder}-original.svg`;
  }

  // === APPLICATION STATE ===
  const STORAGE_KEY = 'flashcards_notes';
  let cards = [];
  let currentIndex = 0;
  let isFlipped = false;

  // Load notes dari localStorage
  function loadNotes() {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : {};
  }
  function saveNotes(notes) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  // Bina deck
  function buildDeck() {
    const notes = loadNotes();
    cards = iconList.map(id => ({
      id,
      iconUrl: getDeviconUrl(id),
      name: notes[id]?.name || '',
      founder: notes[id]?.founder || '',
      app: notes[id]?.app || ''
    }));
  }

  // UI Elements
  const cardEl = document.getElementById('flashcard');
  const iconImg = document.getElementById('iconImage');
  const iconIdDisplay = document.getElementById('iconIdDisplay');
  const backTitle = document.getElementById('backTitle');
  const nameInput = document.getElementById('nameInput');
  const founderInput = document.getElementById('founderInput');
  const appInput = document.getElementById('appInput');
  const progressDots = document.getElementById('progressDots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const flipBtn = document.getElementById('flipBtn');
  const cardWrapper = document.getElementById('cardWrapper');

  function renderCard() {
    const card = cards[currentIndex];
    if (!card) return;
    iconImg.src = card.iconUrl;
    iconIdDisplay.textContent = card.id;
    backTitle.textContent = card.name || 'Teknologi ' + card.id;
    nameInput.value = card.name;
    founderInput.value = card.founder;
    appInput.value = card.app;
    updateProgressDots();
  }

  function updateProgressDots() {
    progressDots.innerHTML = '';
    cards.forEach((_, idx) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (idx === currentIndex ? ' active' : '');
      dot.addEventListener('click', () => navigateTo(idx));
      progressDots.appendChild(dot);
    });
  }

  function flipCard() {
    isFlipped = !isFlipped;
    cardEl.classList.toggle('flipped', isFlipped);
    // Simpan nota semasa flip (jika ada perubahan)
    saveCurrentNote();
    if (!isFlipped) {
      // refresh back display from state
      renderCard();
    }
  }

  function saveCurrentNote() {
    const card = cards[currentIndex];
    card.name = nameInput.value.trim();
    card.founder = founderInput.value.trim();
    card.app = appInput.value.trim();
    // Simpan ke localStorage
    const allNotes = loadNotes();
    allNotes[card.id] = { name: card.name, founder: card.founder, app: card.app };
    saveNotes(allNotes);
    backTitle.textContent = card.name || 'Teknologi ' + card.id;
  }

  function navigateTo(index) {
    if (index < 0 || index >= cards.length) return;
    saveCurrentNote();
    currentIndex = index;
    if (isFlipped) {
      // Balikkan dulu baru render
      isFlipped = false;
      cardEl.classList.remove('flipped');
    }
    renderCard();
  }

  function nextCard() { navigateTo(currentIndex + 1); }
  function prevCard() { navigateTo(currentIndex - 1); }

  // Swipe detection
  let touchStartX = 0;
  let touchStartY = 0;
  cardWrapper.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive: true});

  cardWrapper.addEventListener('touchend', (e) => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) nextCard();
      else prevCard();
    }
    touchStartX = 0;
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === 'ArrowRight') nextCard();
    else if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); flipCard(); }
  });

  // Buttons
  prevBtn.addEventListener('click', prevCard);
  nextBtn.addEventListener('click', nextCard);
  flipBtn.addEventListener('click', flipCard);
  cardEl.addEventListener('click', (e) => {
    // Jangan flip jika klik pada input
    if (e.target.tagName === 'INPUT') return;
    flipCard();
  });

  // Auto-save on input change
  [nameInput, founderInput, appInput].forEach(inp => inp.addEventListener('input', saveCurrentNote));

  // Init
  buildDeck();
  renderCard();

  // Fallback icon jika image error
  iconImg.addEventListener('error', function() {
    this.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"%3E%3Crect x="3" y="3" width="18" height="18" rx="4"%3E%3C/rect%3E%3Ccircle cx="12" cy="12" r="4"%3E%3C/circle%3E%3C/svg%3E';
  });
</script>
</body>
</html>
